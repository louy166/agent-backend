spring.application.name=mobilee_backend


# ================================
# Agence Masriva - Configuration
# ================================

# Server
server.port=8080

# Base de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/masriva_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# Logs
logging.level.com.masriva=DEBUG